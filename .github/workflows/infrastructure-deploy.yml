name: Infrastructure Deploy

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/infrastructure-deploy.yml"
      - ".github/workflows/infrastructure-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx cdk synth

  deploy-staging-infra:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
    env:
      SLACK_WORKSPACE_ID: ${{ vars.SLACK_WORKSPACE_ID }}
      SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gh-actions-infra-staging-deploy
      - run: npx cdk deploy CivicBlueprintDns CivicBlueprintStagingSite CivicBlueprintSubmissionApi CivicBlueprintMonitoring CivicBlueprintGitHubOidc --require-approval never

  deploy-production-infra:
    needs: deploy-staging-infra
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      SLACK_WORKSPACE_ID: ${{ vars.SLACK_WORKSPACE_ID }}
      SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gh-actions-infra-production-deploy
      - run: npx cdk deploy CivicBlueprintProductionSite CivicBlueprintSubmissionApi CivicBlueprintMonitoring CivicBlueprintGitHubOidc --require-approval never
