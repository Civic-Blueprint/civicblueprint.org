name: Deploy

on:
  repository_dispatch:
    types:
      - content-updated
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUBMISSION_API_URL: ${{ vars.NEXT_PUBLIC_SUBMISSION_API_URL }}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ vars.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
      NEXT_PUBLIC_PLAUSIBLE_SRC: ${{ vars.NEXT_PUBLIC_PLAUSIBLE_SRC }}
      NEXT_PUBLIC_CLARITY_ID: ${{ vars.NEXT_PUBLIC_CLARITY_ID }}
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Civic-Blueprint/project-2028
          path: website/content/project-2028
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: website/out/
          retention-days: 1

  deploy-staging:
    needs: build
    if: github.event_name == 'repository_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gh-actions-staging-deploy
      - run: aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
      - name: Block staging from crawlers
        run: |
          printf "User-agent: *\nDisallow: /\n" | aws s3 cp - s3://${{ secrets.S3_BUCKET_NAME }}/robots.txt --content-type text/plain
          aws s3 rm s3://${{ secrets.S3_BUCKET_NAME }}/sitemap.xml || true
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} --paths "/*"

  deploy-prod:
    needs:
      - build
      - deploy-staging
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.deploy-staging.result == 'success' && ((github.event_name == 'repository_dispatch') || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gh-actions-prod-deploy
      - run: aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} --paths "/*"
